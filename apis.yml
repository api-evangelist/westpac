  properties:
  - url: https://www.westpac.com.au/about-westpac/innovation/open-banking/product-api/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: APIReference
  - url: openapi/westpac-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Product Reference Data (PRD) API exposing Westpac's
    banking product catalogue (rates, fees, features, eligibility) under Australia's
    Consumer Data Right. Confirmed live returning HTTP 200 with a data.products array,
    64 total product records across Westpac Group brands, served at supported version
    x-v 5. No security or other headers are required to call this API; only the x-v
    header (versions 4 and 5) is honoured. Conforms to the DSB Consumer Data Standards
    Get Products / Get Product Detail contract.

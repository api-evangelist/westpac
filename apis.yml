aid: westpac
url: https://raw.githubusercontent.com/api-evangelist/westpac/refs/heads/main/apis.yml
name: Westpac Banking Corporation
kind: company
description: Westpac Banking Corporation is Australia's oldest bank and company, founded
  in 1817 as the Bank of New South Wales, and is one of the country's "Big Four" banks.
  Headquartered in Sydney, it is a publicly listed company on the Australian Securities
  Exchange (ASX:WBC), not a customer-owned mutual, and operates a multi-brand group
  that includes St.George, BankSA, Bank of Melbourne, and RAMS. As an authorised deposit-taking
  institution (ADI) regulated by APRA, Westpac is a designated data holder under Australia's
  Consumer Data Right (CDR / Open Banking) regime and exposes a public, unauthenticated
  Product Reference Data (PRD) API conforming to the DSB Consumer Data Standards. Consumer
  and account data sharing beyond product reference data is available only to accredited
  data recipients through the CDR's authenticated, consent-driven channels.

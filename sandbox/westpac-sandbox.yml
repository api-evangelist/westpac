generated: '2026-07-21'
method: searched
source: https://quickstream.westpac.com.au/docs/general/test-account-numbers/
note: >-
  Test/sandbox surface for Westpac's first-party payment gateways (QuickStream
  and PayWay). The CDR Product Reference Data API is public/unauthenticated and
  has no sandbox; these test values belong to the QuickStream/PayWay merchant
  payment platforms. All values below are published verbatim by Westpac for
  testing — none are secrets and none were invented.
apis:
  - westpac:westpac-quickstream-rest-api
  - westpac:westpac-payway-rest-api
environments:
  quickstream:
    test:
      au: https://api.quickstream.support.qvalent.com/rest/v1
      nz: https://quickapi-test.paymentsonline.co.nz/rest/v1
    live:
      au: https://api.quickstream.westpac.com.au/rest/v1
      nz: https://quickapi.paymentsonline.co.nz/rest/v1
    key_model: >-
      Each facility issues both Secret API Keys (server-side, full access) and
      Publishable API Keys (client-side, tokenisation only). Test facilities
      issue test API keys; live facilities issue production API keys. Keys are
      differentiated by facility/permission rather than by a documented prefix.
  payway:
    key_model: >-
      Publishable API keys (client-side, payway.js tokenisation) and Secret API
      keys (server-side, full access). Developers obtain a free PayWay test
      facility before purchasing live access.
    docs: https://www.payway.com.au/docs/rest.html
